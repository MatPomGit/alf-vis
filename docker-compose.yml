version: "3.9"

services:
  robot-perception-core:
    # Profil core: tryb offline (MP4), bez ROS2 i bez dostępu do urządzeń /dev.
    profiles: ["core"]
    build:
      context: .
      dockerfile: src/robot_perception/Dockerfile
    image: robot-perception:core
    working_dir: /workspace/robot_perception
    # Montujemy kod źródłowy oraz katalog wyników.
    volumes:
      - ./src/robot_perception:/workspace/robot_perception
      - ./output:/workspace/robot_perception/output
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - INPUT_MP4_PATH=${INPUT_MP4_PATH}
    entrypoint: ["micromamba", "run", "-n", "robot_perception"]
    command: ["python", "main_perception.py", "--source", "video_file"]

  robot-perception-ros-hw:
    # Profil ros-hw: ROS2 + bridge RTAB-Map + dostęp do urządzeń kamer z /dev.
    profiles: ["ros-hw"]
    build:
      context: .
      dockerfile: src/robot_perception/Dockerfile
    image: robot-perception:ros-hw
    working_dir: /workspace/robot_perception
    volumes:
      - ./src/robot_perception:/workspace/robot_perception
      - ./output:/workspace/robot_perception/output
    env_file:
      - .env
    devices:
      - ${RGB_CAMERA_DEVICE}:${RGB_CAMERA_DEVICE}
      - ${DEPTH_CAMERA_DEVICE}:${DEPTH_CAMERA_DEVICE}
    # Dla GPU (opcjonalnie): odkomentuj device_requests poniżej dla Docker Engine z obsługą NVIDIA.
    # device_requests:
    #   - driver: nvidia
    #     count: all
    #     capabilities: ["gpu"]
    environment:
      - PYTHONUNBUFFERED=1
      - ROS_DISTRO=${ROS_DISTRO}
      - RTABMAP_ODOM_TOPIC=${RTABMAP_ODOM_TOPIC}
      - RTABMAP_MAPDATA_TOPIC=${RTABMAP_MAPDATA_TOPIC}
      - RTABMAP_LOCALIZATION_TOPIC=${RTABMAP_LOCALIZATION_TOPIC}
    entrypoint: ["/bin/bash", "-lc"]
    command:
      - >-
        source /opt/ros/${ROS_DISTRO}/setup.bash
        && micromamba run -n robot_perception python main_slam.py
