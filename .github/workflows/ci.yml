name: CI

on:
  push:
    branches: ["main", "copilot/**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Lint · Type-check · Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Check runtime manifest drift (robot_perception)
        run: python src/robot_perception/scripts/sync_requirements.py --check

      - name: Lint (ruff)
        run: ruff check src/ tests/

      - name: Format check (ruff)
        run: ruff format --check src/ tests/

      - name: Type-check (mypy)
        run: mypy src/image_analysis/

      - name: Run tests with coverage
        run: pytest --cov=src/image_analysis --cov-report=term-missing

  robot_perception_image_smoke:
    name: Robot perception image · build + smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          # Profil bazowy uruchamiany w każdym PR/push.
          - profile: base
            ros_profile: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/robot-perception
          tags: |
            type=sha,prefix=${{ matrix.profile }}-
            type=raw,value=${{ matrix.profile }}-latest,enable={{is_default_branch}}

      - name: Build Docker image (load locally for smoke tests)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/robot_perception/Dockerfile
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Smoke test imports (cv2, numpy, open3d, ultralytics)
        env:
          IMAGE_REF: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
        run: |
          docker run --rm "$IMAGE_REF" python - <<'PY'
          import cv2
          import numpy
          import open3d
          import ultralytics

          print("OK: podstawowe importy działają")
          PY

      - name: Smoke test ROS import (optional for ROS profile)
        if: matrix.ros_profile
        env:
          IMAGE_REF: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
        run: |
          docker run --rm "$IMAGE_REF" python - <<'PY'
          import rclpy

          print("OK: import rclpy działa dla profilu ROS")
          PY

      - name: Smoke test offline mode (CLI help)
        env:
          IMAGE_REF: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
        run: |
          docker run --rm "$IMAGE_REF" \
            python scripts/run_perception_from_mp4.py --help

      - name: Push Docker image (only after smoke tests)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/robot_perception/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

